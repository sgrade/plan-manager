name: DCO

# Verifies every human-authored commit in a pull request carries a
# Developer Certificate of Origin sign-off (`Signed-off-by:`). Automated
# bot authors (e.g. dependabot, github-actions) are exempt. release-please
# release PRs are also exempt: their commits are authored via a PAT (so the
# author is a human name, not `*[bot]`) but are still machine-generated.
# Self-contained (no third-party action) to avoid supply-chain exposure.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by trailers
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          # Exempt machine-generated release-please PRs (commits are authored
          # via PAT, so the author is not `*[bot]` and would otherwise fail).
          case "$HEAD_REF" in
            release-please--*)
              echo "DCO: skipping automated release-please PR ($HEAD_REF)."
              exit 0
              ;;
          esac
          missing=0
          while read -r sha; do
            [ -n "$sha" ] || continue
            name="$(git show -s --format=%an "$sha")"
            case "$name" in
              *'[bot]') continue ;;
            esac
            if ! git show -s --format=%B "$sha" \
                 | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha by '$name' is missing a Signed-off-by trailer"
              missing=1
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed — sign off every commit with 'git commit -s'."
            exit 1
          fi
          echo "DCO: all human-authored commits are signed off."
